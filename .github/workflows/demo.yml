name: Demo

# Deploys a demo page built from the test fixture to this repo's GitHub Pages.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - src/garnish.py
      - action.yml
      - tests/fixtures/tofu_output_json.json

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-demo:
    name: Deploy demo page
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.garnish.outputs.page-url }}
    permissions:
      contents: read
      pages: write # deploy the generated site to GitHub Pages
      id-token: write # OIDC token for verified Pages deployment
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Garnish outputs
        id: garnish
        uses: ./
        with:
          outputs-file: tests/fixtures/tofu_output_json.json
          title: tofu-garnish demo
