name: Demo

# Applies the example OpenTofu configs and publishes their real outputs to
# this repo's GitHub Pages, exercising the full pipeline end to end.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - src/**
      - action.yml
      - examples/**

permissions: {}

concurrency:
  group: tofu-garnish-demo
  cancel-in-progress: false

jobs:
  deploy-demo:
    name: Deploy demo page
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the generated site to the gh-pages branch
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_wrapper: false

      - name: Apply example configs and export outputs
        run: |
          set -euo pipefail
          for ws in demo staging; do
            tofu -chdir="examples/$ws" init -input=false
            tofu -chdir="examples/$ws" apply -input=false -auto-approve
            tofu -chdir="examples/$ws" output -json > "$ws-outputs.json"
          done

      - name: Garnish outputs
        id: garnish
        uses: ./
        with:
          workspaces: |
            prod=demo-outputs.json
            staging=staging-outputs.json
          title: tofu-garnish demo
