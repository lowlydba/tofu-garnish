name: Demo

# Deploys a demo page built from the test fixture to this repo's GitHub Pages.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - src/**
      - action.yml
      - tests/fixtures/tofu_output_json.json

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-demo:
    name: Deploy demo page
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the generated site to the gh-pages branch
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Garnish outputs
        id: garnish
        uses: ./
        with:
          workspaces: |
            prod=tests/fixtures/tofu_output_json.json
            staging=tests/fixtures/dflook_json_output_path.json
          title: tofu-garnish demo
